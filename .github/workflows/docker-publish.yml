# Publish FrankenPHP base images to GHCR (linux/amd64).
# Coolify builds the app from Dockerfile.staging / Dockerfile.production using those bases
# (build-arg FRANKENPHP_BASE_IMAGE). See docs/coolify-deployment.md.

name: Docker publish (FrankenPHP base)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  frankenphp-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pick base Dockerfile and tag
        id: pick
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            echo "file=Dockerfile.frankenphp-base.staging" >> "$GITHUB_OUTPUT"
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          else
            echo "file=Dockerfile.frankenphp-base.production" >> "$GITHUB_OUTPUT"
            echo "tag=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata (FrankenPHP base)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Canonical: ghcr.io/<owner>/<repo>-frankenphp. Alias geoidx-frankenphp matches local/Coolify env overrides.
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}-frankenphp
            ${{ env.REGISTRY }}/jloescher/geoidx-frankenphp
          tags: |
            type=raw,value=${{ steps.pick.outputs.tag }}
            type=sha,prefix=sha-

      - name: Build and push FrankenPHP base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.pick.outputs.file }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frankenphp-base-${{ steps.pick.outputs.tag }}
          cache-to: type=gha,mode=max,scope=frankenphp-base-${{ steps.pick.outputs.tag }}
