# IDX-Images edge (built from repo root: Dockerfile.idx-images).
# Revenue impact: every byte is authorized by idx-api (domain or Sanctum) before MLS bytes
# leave the origin; this edge only terminates TLS and forwards trusted headers.

upstream idx_api_images {
    server idx-api:8000;
    keepalive 8;
}

server {
    listen 8080;
    server_name _;

    # Only /images/* is proxied — no legacy ?url= or other bypass routes.
    location /images/ {
        proxy_pass http://idx_api_images;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Forward auth context to idx-api (same contract as idx-api.quantyralabs.cc).
        proxy_set_header Referer $http_referer;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Domain-Slug $http_x_domain_slug;

        proxy_read_timeout 60s;
        proxy_buffering on;
    }

    location = /health {
        default_type text/plain;
        return 200 "OK\n";
    }

    location / {
        return 404;
    }
}
