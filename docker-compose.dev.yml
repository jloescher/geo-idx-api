services:
  idx-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
      args:
        BASE_IMAGE: ${DEV_BASE_IMAGE:-dunglas/frankenphp:php8.5-alpine}
    image: ${DEV_IMAGE_NAME:-quantyra/idx-api-dev:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      OCTANE_HOST: 0.0.0.0
      OCTANE_PORT: ${OCTANE_PORT:-8000}
      OCTANE_WATCH: ${OCTANE_WATCH:-false}
      XDEBUG_MODE: ${XDEBUG_MODE:-develop,debug}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal client_port=9003 idekey=VSCODE start_with_request=yes}
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=idx-api-dev}
    ports:
      - "${OCTANE_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - idx-api
    init: true
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /var/www/html
          ignore:
            - .git/
            - vendor/
            - node_modules/
            - storage/
            - bootstrap/cache/
            - .cursor/
            - .idea/
            - .vscode/
            - "*.log"
        - action: rebuild
          path: composer.json
        - action: rebuild
          path: composer.lock
        - action: rebuild
          path: Dockerfile.dev
        - action: rebuild
          path: docker-compose.dev.yml

  idx-images-dev:
    build:
      context: .
      dockerfile: Dockerfile.idx-images
    image: ${DEV_IMAGES_NAME:-quantyra/idx-images-dev:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "${IMAGES_PORT:-8080}:8080"
    init: true

  cloudflared-dev:
    image: cloudflare/cloudflared:2026.3.0
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - idx-api-dev
      - idx-images-dev
    environment:
      TUNNEL_METRICS: 0.0.0.0:20241
    init: true
