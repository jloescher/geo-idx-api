# Go stack local development
# (This compose was originally developed alongside the prior Laravel stack.)
services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: idx_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: golang:1.25-alpine
    working_dir: /src
    volumes:
      - .:/src
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://postgres:postgres@postgres:5432/idx_api?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c", "go run github.com/pressly/goose/v3/cmd/goose@v3.24.3 -dir migrations up"]

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_PORT: "8000"
      DB_HOST: postgres
      DB_PASSWORD: postgres
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - geoidx-cache:/var/cache/geoidx/images

  worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PASSWORD: postgres
      WORKER_QUEUES: default,sync-kickoff,bridge-sync-fetch,bridge-sync-persist,spark-sync-fetch,spark-sync-persist
    depends_on:
      - api

  scheduler:
    build:
      context: .
      target: scheduler
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PASSWORD: postgres
    depends_on:
      - api

  idx-images:
    build:
      context: .
      dockerfile: Dockerfile.idx-images
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  geoidx-cache:
