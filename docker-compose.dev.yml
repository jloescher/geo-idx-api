services:
  idx-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
      args:
        BASE_IMAGE: ${DEV_BASE_IMAGE:-dunglas/frankenphp:php8.5-alpine}
    image: ${DEV_IMAGE_NAME_API:-quantyra/idx-api-dev-api:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      OCTANE_HOST: 0.0.0.0
      OCTANE_PORT: ${OCTANE_PORT:-8000}
      OCTANE_WATCH: ${OCTANE_WATCH:-false}
      XDG_CONFIG_HOME: /var/www/html/config
      XDG_DATA_HOME: /var/www/html/data
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal client_port=9003 idekey=VSCODE start_with_request=trigger}
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=idx-api-dev}
    ports:
      - "${OCTANE_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - idx-api
    healthcheck:
      # Cloudflared returns 502 when the origin refuses TCP; wait until Octane binds before other services rely on the API.
      test: ["CMD-SHELL", "curl -sf --connect-timeout 3 http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped
    init: true
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /var/www/html
          ignore:
            - .git/
            - vendor/
            - node_modules/
            - storage/
            - bootstrap/cache/
            - .cursor/
            - .idea/
            - .vscode/
            - "*.log"
        - action: rebuild
          path: composer.json
        - action: rebuild
          path: composer.lock
        - action: rebuild
          path: Dockerfile.dev
        - action: rebuild
          path: docker-compose.dev.yml

  idx-queue-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev-worker
      args:
        BASE_IMAGE: ${DEV_BASE_IMAGE:-dunglas/frankenphp:php8.5-alpine}
    image: ${DEV_IMAGE_NAME_QUEUE:-quantyra/idx-api-dev-queue:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      XDG_CONFIG_HOME: /var/www/html/config
      XDG_DATA_HOME: /var/www/html/data
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      WORKER_QUEUES: ${WORKER_QUEUES:-default}
    depends_on:
      - idx-api-dev
    restart: unless-stopped
    init: true

  idx-scheduler-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev-scheduler
      args:
        BASE_IMAGE: ${DEV_BASE_IMAGE:-dunglas/frankenphp:php8.5-alpine}
    image: ${DEV_IMAGE_NAME_SCHEDULER:-quantyra/idx-api-dev-scheduler:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      XDG_CONFIG_HOME: /var/www/html/config
      XDG_DATA_HOME: /var/www/html/data
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    depends_on:
      - idx-api-dev
    restart: unless-stopped
    init: true

  idx-images-dev:
    build:
      context: .
      dockerfile: Dockerfile.idx-images
    image: ${DEV_IMAGES_NAME:-quantyra/idx-images-dev:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - "${IMAGES_PORT:-8080}:8080"
    restart: unless-stopped
    init: true

  cloudflared-dev:
    image: cloudflare/cloudflared:2026.3.0
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      idx-api-dev:
        condition: service_healthy
      idx-images-dev:
        condition: service_started
    environment:
      TUNNEL_METRICS: 0.0.0.0:20241
    restart: unless-stopped
    init: true
