services:
  idx-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
      args:
        BASE_IMAGE: ${DEV_BASE_IMAGE:-dunglas/frankenphp:php8.5-alpine}
    image: ${DEV_IMAGE_NAME:-quantyra/idx-api-dev:local}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      OCTANE_HOST: 0.0.0.0
      OCTANE_PORT: ${OCTANE_PORT:-8000}
      OCTANE_WATCH: ${OCTANE_WATCH:-false}
      CLOUDFLARED_TUNNEL_URL: ${CLOUDFLARED_TUNNEL_URL:-http://127.0.0.1:8000}
      CLOUDFLARED_DEV_DOMAIN: ${CLOUDFLARED_DEV_DOMAIN:-idx-api.quantyralabs.cc}
      CLOUDFLARED_TOKEN: ${CLOUDFLARED_TOKEN:-}
      XDEBUG_MODE: ${XDEBUG_MODE:-develop,debug}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal client_port=9003 idekey=VSCODE start_with_request=yes}
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=idx-api-dev}
    ports:
      - "${OCTANE_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /var/www/html
          ignore:
            - .git/
            - vendor/
            - node_modules/
            - storage/
            - bootstrap/cache/
            - .cursor/
            - .idea/
            - .vscode/
            - "*.log"
        - action: rebuild
          path: composer.json
        - action: rebuild
          path: composer.lock
        - action: rebuild
          path: Dockerfile.dev
        - action: rebuild
          path: docker-compose.dev.yml
